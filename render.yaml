services:
  - type: web
    name: inventory-api
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # We'll update ALLOWED_HOSTS after Render gives the final URL
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory_user